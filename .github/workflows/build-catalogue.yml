name: Build catalogue

on:
  push:
    branches: [main]
    paths:
      - 'Region-wise NSP-NHP documents [Living Repository/**'
      - 'Region-wise NSP-NHP documents [Living Repository]/**'
      - 'scripts/build-catalogue.mjs'
      - 'catalogue-overrides.json'
      - 'catalogue-web-resources.json'
      - 'discipline-overrides.json'
      - 'scripts/build-disciplines.mjs'
      - 'scripts/build-country-meta.mjs'
      - 'countries-50m.json'
  workflow_dispatch:

jobs:
  catalogue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate catalogue.json and discipline tags
        run: |
          npm run catalogue
          npm run country-meta
          npm run disciplines

      - name: Commit catalogue if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate atlas data from policy documents'
          file_pattern: catalogue.json country-meta.json discipline-tags.json
